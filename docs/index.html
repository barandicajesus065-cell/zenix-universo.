<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zenix Universe PRO</title>
<style>
body{margin:0;font-family:Arial,sans-serif;background:#0a001a;color:white;transition:0.5s;}
header{display:flex;align-items:center;padding:12px;background:#14002b;position:fixed;width:100%;top:0;z-index:1000}
h1{margin:0;color:#ffccff;flex:1;cursor:pointer;font-size:1.5em;text-shadow:0 0 5px #cc99ff;}
.menuIcon{font-size:28px;cursor:pointer;display:block;padding:0 12px}
.sidebar{height:100%;width:0;position:fixed;top:0;left:0;background:#220044;overflow-x:hidden;transition:0.4s;padding-top:60px;z-index:1200;}
.sidebar a{padding:14px 20px;display:block;color:#ffccff;text-decoration:none;font-weight:bold;font-size:1.1em;}
.sidebar a:hover{background:#330066}
.box{max-width:1000px;margin:120px auto;padding:25px;background:#1a0033;border-radius:12px;box-shadow:0 0 25px rgba(0,0,0,0.7)}
.producto{padding:20px;border-radius:12px;margin:15px 0;color:white;transition:0.4s;background:linear-gradient(145deg,#000,#330066);box-shadow:0 0 15px rgba(102,0,102,0.5);}
.producto:hover{transform:scale(1.03);box-shadow:0 0 30px rgba(204,153,255,0.7);}
.product-img{width:100%;height:120px;background:linear-gradient(90deg,#220044,#6600cc);color:#ffccff;display:flex;align-items:center;justify-content:center;font-weight:bold;font-size:1em;border-radius:8px;text-transform:uppercase;transition:0.3s;}
.product-img img{width:100%;height:100%;border-radius:8px;object-fit:cover;}
.product-img:hover{background:linear-gradient(90deg,#6600cc,#220044);}
input,select,button,textarea{width:95%;padding:12px;margin:8px 0;border-radius:10px;border:none;font-size:1em;}
input,select,textarea{background:#330066;color:white}
button{background:#cc99ff;color:black;font-weight:bold;cursor:pointer;transition:0.3s;font-size:1em}
button:hover{background:#ddbbff}
.modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);display:flex;align-items:center;justify-content:center;z-index:3000;display:none;}
.modal-content{background:#440088;padding:25px;border-radius:20px;text-align:center;min-width:300px;box-shadow:0 0 30px #ff99ff, 0 0 60px #cc66ff inset;animation:slideIn 0.5s ease forwards;}
.modal-content p{font-size:1.4em;color:#ffccff;word-break:break-all;margin-bottom:15px;font-weight:bold;}
.modal-content button{margin:10px;padding:10px 20px;border-radius:12px;font-weight:bold;cursor:pointer;}
@keyframes slideIn{0%{transform:scale(0.5) rotateX(-90deg);opacity:0}100%{transform:scale(1) rotateX(0);opacity:1}}
.soporte{position:fixed;bottom:20px;right:20px;background:#25D366;width:60px;height:60px;border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 0 10px rgba(0,0,0,0.5);z-index:2002;cursor:pointer;}
.soporte img{width:35px;height:35px;}
</style>
</head>
<body>

<header>
<span class="menuIcon" id="menuBtn" onclick="openNav()">☰</span>
<h1 id="tituloWeb" onclick="contadorAdmin()">Zenix Universe PRO</h1>
</header>

<div id="mySidebar" class="sidebar">
<a onclick="abrirPrincipal()">Página Principal</a>
<a onclick="abrirSaldo()">Ver Saldo</a>
<a onclick="abrirHistorial()">Mis Keys</a>
<a onclick="abrirProductos()">Ver Productos</a>
<a onclick="abrirRecarga()">Recargar Saldo</a>
<a onclick="cerrarSesion()">Cerrar Sesión</a>
<a onclick="closeNav()">Cerrar Menú</a>
</div>

<div id="registerBox" class="box" style="display:block">
<h2>Registro</h2>
<input id="regUser" placeholder="Usuario">
<input id="regEmail" placeholder="Correo">
<input id="regPass" type="password" placeholder="Contraseña">
<button onclick="register()">Registrarse</button>
<p><a onclick="mostrarLogin()">Iniciar Sesión</a></p>
</div>

<div id="loginBox" class="box" style="display:none">
<h2>Iniciar Sesión</h2>
<input id="loginEmail" placeholder="Correo">
<input id="loginPass" type="password" placeholder="Contraseña">
<label style="display:block;margin:5px 0"><input type="checkbox" id="recordarme"> Recordarme</label>
<button onclick="login()">Entrar</button>
<p><a onclick="mostrarRegister()">Regístrate</a></p>
</div>

<div id="dashboard" class="box" style="display:none">
<div id="contenido"></div>
</div>

<div id="keyModal" class="modal">
<div class="modal-content" id="keyModalContent">
<p id="keyText"></p>
<button onclick="copiarKey()">Copiar Key</button>
<button onclick="cerrarModal()">Cerrar</button>
</div>
</div>

<div class="soporte" onclick="window.open('https://wa.me/573008405256','_blank')">
<img src="https://cdn-icons-png.flaticon.com/512/124/124034.png" alt="WhatsApp">
</div>

<script>
// --- VARIABLES ---
let currentUser=null;
let adminClicks=0;
const productosData=[
{name:"HG CHEATS", imagen:""},
{name:"DRIP CLIENTE MOBILE", imagen:""},
{name:"LK TEAM", imagen:""},
{name:"XTFFH4X", imagen:""},
{name:"BR MODS", imagen:""},
{name:"CUBAN MOD", imagen:""},
{name:"CUBAN RAGE", imagen:""},
{name:"BEYMOD CHEAT", imagen:""},
{name:"EVO CHEAT", imagen:""},
{name:"STRIKS BR", imagen:""}
];

const preciosProductos={
"HG CHEATS":[{dias:1,precio:1.2},{dias:10,precio:5.7},{dias:30,precio:9.2}],
"DRIP CLIENTE MOBILE":[{dias:1,precio:2},{dias:7,precio:5.3},{dias:15,precio:8.9},{dias:30,precio:11.3}],
"LK TEAM":[{dias:1,precio:0.9},{dias:3,precio:1.5},{dias:5,precio:3.7},{dias:7,precio:5.1},{dias:10,precio:7.3},{dias:30,precio:9.3}],
"XTFFH4X":[{dias:1,precio:0.9},{dias:3,precio:1.5},{dias:5,precio:3.7},{dias:7,precio:5.1},{dias:10,precio:7.3},{dias:30,precio:9.3}],
"BR MODS":[{dias:1,precio:0.9},{dias:3,precio:1.5},{dias:5,precio:3.7},{dias:7,precio:5.1},{dias:10,precio:7.3},{dias:30,precio:9.3}],
"CUBAN MOD":[{dias:1,precio:1.1},{dias:7,precio:2.7},{dias:15,precio:6.2},{dias:30,precio:7.6}],
"CUBAN RAGE":[{dias:1,precio:0.8},{dias:7,precio:4.1},{dias:30,precio:7.6}],
"BEYMOD CHEAT":[{dias:1,precio:0.9},{dias:3,precio:1.5},{dias:5,precio:3.7},{dias:7,precio:5.1},{dias:10,precio:7.3},{dias:30,precio:9.3}],
"EVO CHEAT":[{dias:1,precio:0.9},{dias:3,precio:1.5},{dias:5,precio:3.7},{dias:7,precio:5.1},{dias:10,precio:7.3},{dias:30,precio:9.3}],
"STRIKS BR":[{dias:1,precio:0.9},{dias:3,precio:1.5},{dias:5,precio:3.7},{dias:7,precio:5.1},{dias:10,precio:7.3},{dias:30,precio:9.3}]
};

// --- INICIALIZAR STOCK ---
productosData.forEach(p=>{
    if(!localStorage.getItem("zenix_stock_"+p.name)) localStorage.setItem("zenix_stock_"+p.name, JSON.stringify([]));
    if(!localStorage.getItem("zenix_global_"+p.name)) localStorage.setItem("zenix_global_"+p.name, JSON.stringify([]));
});

// --- ADMIN OCULTO 5 CLICKS ---
function contadorAdmin(){adminClicks++;if(adminClicks>=5){adminClicks=0;mostrarLoginAdmin();}}
function mostrarLoginAdmin(){
    let pass=prompt("🔒 Acceso Admin\nIngresa la contraseña:");
    if(pass==="Zenix2026"){abrirPanelAdmin();}
    else if(pass!==null){alert("Contraseña incorrecta");}
}

// --- SIDEBAR ---
function openNav(){document.getElementById("mySidebar").style.width="250px"}
function closeNav(){document.getElementById("mySidebar").style.width="0"}
function cerrarSesion(){localStorage.removeItem("zenix_currentUser");location.reload();}

// --- MOSTRAR CAJAS ---
function mostrarLogin(){registerBox.style.display="none";loginBox.style.display="block";}
function mostrarRegister(){loginBox.style.display="none";registerBox.style.display="block";}

// --- REGISTRO ---
function register(){
let u=regUser.value.trim();
let e=regEmail.value.trim();
let p=regPass.value;
if(!u||!e||!p){alert("Completa todos los campos");return;}
if(!e.includes("@")){alert("Correo debe contener @");return;}
if(localStorage.getItem("zenix_"+u)){alert("Usuario ya existe");return;}
localStorage.setItem("zenix_"+u,JSON.stringify({email:e,password:p,saldo:0,keys:[],keysStock:{},bloqueado:false,notificaciones:[],historial:[]})); 
alert("Registrado correctamente");mostrarLogin();
}

// --- LOGIN ---
function login(){
let e=loginEmail.value.trim();
let p=loginPass.value;
for(let k in localStorage){
    if(k.startsWith("zenix_") && k!=="zenix_currentUser"){
        let user=JSON.parse(localStorage.getItem(k));
        if(user.email===e && user.password===p){
            if(user.bloqueado){alert("Cuenta bloqueada");return;}
            currentUser=k;
            localStorage.setItem("zenix_currentUser",k);
            mostrarDashboard();return;
        }
    }
}
alert("Datos incorrectos");
}

// --- DASHBOARD ---
function mostrarDashboard(){
registerBox.style.display="none";
loginBox.style.display="none";
dashboard.style.display="block";
abrirPrincipal();
}
<script>
// --- FUNCIONES DEL MENU ---
function abrirPrincipal(){ 
let user=JSON.parse(localStorage.getItem(currentUser));
let totalCompradas=user.keys.length;
let totalStock=0;
for(let p in user.keysStock){totalStock+=user.keysStock[p].length;}
let nivel="Nuevo";
if(totalCompradas>=15) nivel="Cliente Premium 👑";
else if(totalCompradas>=5) nivel="Cliente VIP ⭐";
else if(totalCompradas>=1) nivel="Cliente 🔥";
let progresoMax=15; let progreso=Math.min(totalCompradas,progresoMax);
let porcentaje=(progreso/progresoMax)*100;
contenido.innerHTML=`
<h2>Resumen</h2>
<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:10px;margin-bottom:20px">
<div style="background:#220044;padding:15px;border-radius:10px"><h3>💰 Saldo</h3><p>$${user.saldo}</p></div>
<div style="background:#220044;padding:15px;border-radius:10px"><h3>🔑 Compradas</h3><p>${totalCompradas}</p></div>
<div style="background:#220044;padding:15px;border-radius:10px"><h3>📦 Disponibles</h3><p>${totalStock}</p></div>
<div style="background:#220044;padding:15px;border-radius:10px"><h3>🏆 Nivel</h3><p>${nivel}</p></div>
</div>
<div style="background:#330066;border-radius:8px;height:20px">
<div style="background:#cc99ff;height:100%;width:${porcentaje}%;border-radius:8px"></div></div>
<p>${progreso} / ${progresoMax} compras para Premium</p>`;
closeNav();
}

// --- PRODUCTOS ---
function abrirProductos(){
    let user = JSON.parse(localStorage.getItem(currentUser));
    let html = '<h2>Productos Disponibles</h2>';
    productosData.forEach((p,index)=>{
        let stock = JSON.parse(localStorage.getItem("zenix_stock_"+p.name)).length + JSON.parse(localStorage.getItem("zenix_global_"+p.name)).length;
        let opciones = preciosProductos[p.name].map((pr,i)=>`<option value="${pr.precio}">${pr.dias} DIA(S) - ${pr.precio} USD</option>`).join('');
        let imgHTML = p.imagen? `<img src="${p.imagen}" style="width:100%;height:120px;border-radius:8px;object-fit:cover;margin-bottom:8px">` : `<div class="product-img">${p.name}</div>`;
        html += `
        <div class="producto">
            ${imgHTML}
            <p>Stock: ${stock}</p>
            <select id="duracion_${index}">
                ${opciones}
            </select>
            <button onclick="generateKey('${p.name}', ${index})">Generar Key</button>
        </div>`;
    });
    contenido.innerHTML = html;
    closeNav();
}

// --- GENERAR KEY ---
function generateKey(productName,index){
    let user=JSON.parse(localStorage.getItem(currentUser));
    let stock=JSON.parse(localStorage.getItem("zenix_stock_"+productName));
    let globalStock=JSON.parse(localStorage.getItem("zenix_global_"+productName));
    let precio=parseFloat(document.getElementById("duracion_"+index).value);
    let duracion=document.getElementById("duracion_"+index).selectedOptions[0].text.split(" - ")[0];
    if(stock.length<=0 && globalStock.length<=0){alert("Producto sin stock");return;}
    if(user.saldo<precio){alert("Saldo insuficiente");return;}
    let key;
    if(stock.length>0){ key=stock.shift(); localStorage.setItem("zenix_stock_"+productName, JSON.stringify(stock)); }
    else { key=globalStock.shift(); localStorage.setItem("zenix_global_"+productName, JSON.stringify(globalStock)); }
    user.saldo -= precio;
    let fecha = new Date().toLocaleString();
    if(!user.keysStock[productName]) user.keysStock[productName]=[];
    user.keysStock[productName].push(key);
    user.keys.push({producto:productName, key:key, duracion:duracion, fecha:fecha});
    user.historial.push({producto:productName, key:key, duracion:duracion, fecha:fecha});
    localStorage.setItem(currentUser, JSON.stringify(user));
    let modal=document.getElementById("keyModal");
    modal.style.display="flex";
    modal.classList.remove("slideOut");
    document.getElementById("keyText").innerText=`${key} - ${duracion}`;
}

// --- COPIAR Y CERRAR MODAL ---
function copiarKey(){navigator.clipboard.writeText(document.getElementById("keyText").innerText); alert("Key copiada al portapapeles");}
function cerrarModal(){document.getElementById("keyModal").style.display="none";}

// --- PANEL ADMIN ---
function abrirPanelAdmin(){
contenido.innerHTML=`<h2>Panel Admin</h2>
<p>Agregar Saldo</p>
<input id="adminUser" placeholder="Usuario">
<input id="adminSaldo" placeholder="Cantidad" type="number">
<button onclick="adminAgregarSaldo()">Agregar</button>

<p>Agregar/Modificar Imagen del Producto</p>
<input id="adminProductoImg" placeholder="Producto">
<input type="text" id="adminImgURL" placeholder="URL de la imagen">
<button onclick="adminAgregarImagen()">Guardar Imagen</button>

<p>Agregar Keys al Usuario</p>
<input id="adminProducto" placeholder="Producto">
<textarea id="adminKeys" placeholder="Separadas por coma, puedes añadir duración como 'ABC123 - 1 DIA'"></textarea>
<button onclick="adminAgregarKeys()">Agregar Keys</button>

<p>Publicar Keys Globales</p>
<input id="globalProducto" placeholder="Producto">
<textarea id="globalKeys" placeholder="Separadas por coma, con duración 'ABC123 - 7 DIAS'"></textarea>
<button onclick="adminAgregarKeysGlobal()">Publicar Keys Globales</button>
`;
dashboard.style.display="block";
}

// --- FUNCIONES ADMIN ---
function adminAgregarSaldo(){
let userName=document.getElementById("adminUser").value.trim();
let cantidad=parseInt(document.getElementById("adminSaldo").value);
if(!userName || isNaN(cantidad)){alert("Campos incorrectos");return;}
let key="zenix_"+userName;
let userData=localStorage.getItem(key);
if(!userData){alert("Usuario no existe");return;}
let u=JSON.parse(userData);
u.saldo+=cantidad;
localStorage.setItem(key,JSON.stringify(u));
alert("Saldo agregado correctamente");
}

function adminAgregarImagen(){
let producto=document.getElementById("adminProductoImg").value.trim();
let url=document.getElementById("adminImgURL").value.trim();
let pIndex = productosData.findIndex(p=>p.name===producto);
if(pIndex===-1){alert("Producto no existe");return;}
productosData[pIndex].imagen=url;
alert("Imagen agregada correctamente");
abrirProductos();
}

function adminAgregarKeys(){
let producto=document.getElementById("adminProducto").value.trim();
let keys=document.getElementById("adminKeys").value.split(",").map(k=>k.trim()).filter(k=>k);
if(!productosData.find(p=>p.name===producto)){alert("Producto no existe");return;}
let stock=JSON.parse(localStorage.getItem("zenix_stock_"+producto));
stock.push(...keys);
localStorage.setItem("zenix_stock_"+producto,JSON.stringify(stock));
alert("Keys agregadas correctamente");
}

function adminAgregarKeysGlobal(){
let producto=document.getElementById("globalProducto").value.trim();
let keys=document.getElementById("globalKeys").value.split(",").map(k=>k.trim()).filter(k=>k);
if(!productosData.find(p=>p.name===producto)){alert("Producto no existe");return;}
let stock=JSON.parse(localStorage.getItem("zenix_global_"+producto));
stock.push(...keys);
localStorage.setItem("zenix_global_"+producto,JSON.stringify(stock));
alert("Keys Globales publicadas correctamente");
}

// --- RECARGA ---
function abrirRecarga(){
contenido.innerHTML=`<h2>Recargar Saldo</h2>
<p>Selecciona método y cantidad:</p>
<input id="recCantidad" placeholder="Cantidad">
<button onclick="recargarSaldo()">Recargar</button>`;
closeNav();
}
function recargarSaldo(){
let cantidad=parseInt(document.getElementById("recCantidad").value);
if(isNaN(cantidad) || cantidad<=0){alert("Cantidad inválida");return;}
window.open('https://wa.me/573008405256?text=Recarga%20solicitada%20de%20'+cantidad,'_blank');
alert("Se ha enviado solicitud a WhatsApp");
}

// --- SALDO Y HISTORIAL ---
function abrirSaldo(){ 
let user=JSON.parse(localStorage.getItem(currentUser));
contenido.innerHTML=`<h2>Saldo</h2><p>$${user.saldo}</p>`; 
closeNav(); 
}

function abrirHistorial(){
let user=JSON.parse(localStorage.getItem(currentUser));
let html='<h2>Historial de Keys</h2>';
if(user.historial.length===0) html+='<p>No hay compras</p>';
else user.historial.forEach(h=>{
    html+=`<p>${h.fecha} - ${h.producto} - Key: ${h.key} - ${h.duracion}</p>`;
});
contenido.innerHTML=html; 
closeNav();
}
</script>
</body>
</html>
